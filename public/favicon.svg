<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Hoverboard Havoc">
  <defs>
    <linearGradient id="flame" x1="256" y1="400" x2="256" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5a00"/>
      <stop offset="0.55" stop-color="#ff8c1a"/>
      <stop offset="1" stop-color="#ffc777"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="#0a0a0b"/>

  <!-- flame -->
  <path fill="url(#flame)" d="M256 64
    C224 150 176 175 176 264
    C176 330 210 372 256 372
    C302 372 336 330 336 264
    C336 222 320 196 305 180
    C301 210 286 218 282 194
    C277 160 268 112 256 64 Z"/>
  <!-- hot inner flame -->
  <path fill="#ffe2a6" opacity="0.9" d="M256 206
    C242 240 220 252 220 298
    C220 332 236 360 256 360
    C276 360 292 334 292 302
    C292 280 284 270 277 258
    C273 280 263 276 263 258
    C263 240 260 224 256 206 Z"/>

  <!-- neon LED deck -->
  <rect x="148" y="410" width="216" height="22" rx="11" fill="#2fd3f0" filter="url(#glow)"/>
</svg>
